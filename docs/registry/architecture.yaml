# ─── API DECISIONS ───────────────────────────────────────────────────────────
# Which engine APIs are chosen for which purpose across the project.
# Conflicts: two ADRs using different APIs for the same purpose = inconsistent
# implementation that breaks when one system expects the other's API.
#
# Register an API decision when the choice is non-obvious and other ADRs might
# make a different choice for the same purpose without knowing this was decided.

api_decisions:
  - purpose: module_system
    status: active
    api: Vite 6.x
    not: Rollup (app use case), Webpack 5 (config overhead), native ES modules without build step
    adr: docs/architecture/adr-0001-web-stack-and-module-system.md
    reason: "HMR dev server, npm support, Vitest companion shares vite.config.js, dev CORS proxy for Price API"
    referenced_by:
      - docs/architecture/adr-0001-web-stack-and-module-system.md
    added: 2026-05-21
    revised: ""

  - purpose: module_syntax
    status: active
    api: ES modules (import/export) throughout all source files
    not: CommonJS (require/module.exports), AMD, UMD
    adr: docs/architecture/adr-0001-web-stack-and-module-system.md
    reason: "Native browser module format; Vite-optimised; required for tree-shaking in production build"
    referenced_by:
      - docs/architecture/adr-0001-web-stack-and-module-system.md
    added: 2026-05-21
    revised: ""

  - purpose: module_export_pattern
    status: active
    api: "named PascalCase module-object export: export const ModuleName = { method1, method2 }"
    not: "individual function exports (export function X), default exports (export default), CommonJS module.exports"
    adr: docs/architecture/adr-0002-module-file-structure.md
    reason: "Preserves ModuleName.method() calling convention from all 17 GDDs; groups public API visibly; named import is refactor-safe"
    referenced_by:
      - docs/architecture/adr-0002-module-file-structure.md
    added: 2026-05-21
    revised: ""

  - purpose: file_naming_convention
    status: active
    api: "kebab-case.js matching GDD slug (e.g. case-data-store.js, drop-rate-engine.js)"
    not: "PascalCase.js, camelCase.js, snake_case.js"
    adr: docs/architecture/adr-0002-module-file-structure.md
    reason: "GDD slugs are already kebab-case; zero translation step between design doc name and source file path"
    referenced_by:
      - docs/architecture/adr-0002-module-file-structure.md
    added: 2026-05-21
    revised: ""

  - purpose: event_target
    status: active
    api: "document — all application CustomEvents dispatched on document"
    not: "window (reserved for browser-level events: resize, popstate, beforeunload)"
    adr: docs/architecture/adr-0003-dom-event-architecture.md
    reason: "Consistent target eliminates listener-on-wrong-target failure mode; document is semantically correct for app-internal state events; resolves W-5 advisory"
    referenced_by:
      - docs/architecture/adr-0003-dom-event-architecture.md
    added: 2026-05-21
    revised: ""

  - purpose: audio_implementation
    status: active
    api: "Raw Web Audio API — AudioContext, OscillatorNode, GainNode; no library"
    not: "Howler.js (file-playback only, no synthesis), Tone.js (overkill for 3 sounds)"
    adr: docs/architecture/adr-0004-audio-implementation.md
    reason: "Audio System GDD requires runtime synthesis; Howler.js cannot synthesize; zero dependency advantage"
    referenced_by:
      - docs/architecture/adr-0004-audio-implementation.md
    added: 2026-05-21
    revised: ""

  - purpose: persistence_backend
    status: active
    api: "localStorage wrapped by src/foundation/persistence.js — all reads/writes via Persistence.save/load"
    not: "IndexedDB (async overkill, data fits comfortably in 5MB localStorage), sessionStorage (does not survive tab close), direct localStorage calls in Core modules"
    adr: docs/architecture/adr-0005-persistence-strategy.md
    reason: "GDD specifies localStorage; synchronous API matches Core module mutation cycle; thin wrapper enforces vault_ prefix and graceful degradation centrally"
    referenced_by:
      - docs/architecture/adr-0005-persistence-strategy.md
    added: 2026-05-21
    revised: ""

  - purpose: price_api_source
    status: active
    api: "CSFloat Market API (https://csfloat.com/api/v1/) — direct browser fetch in production if CORS verified; Netlify Function proxy wrapping Steam Market API as fallback"
    not: "Steam Community Market API via direct browser fetch (CORS-blocked), Skinport API (prices reflect Skinport market not Steam Market — inconsistent with GDD fallback prices)"
    adr: docs/architecture/adr-0008-price-api-and-cors-solution.md
    reason: "CSFloat allows browser CORS (verify before VS sprint); Steam prices preferred but require serverless proxy; Skinport prices diverge from GDD fallback values"
    referenced_by:
      - docs/architecture/adr-0008-price-api-and-cors-solution.md
    added: 2026-05-21
    revised: ""

  - purpose: test_framework
    status: active
    api: "Vitest 2.x with jsdom environment; shared mock file at tests/__mocks__/browser-apis.js for AudioContext, requestAnimationFrame, Canvas"
    not: "Jest (ES module config overhead, separate config from Vite), Playwright (overkill for unit/logic tests)"
    adr: docs/architecture/adr-0009-test-framework-and-ci.md
    reason: "Vitest shares vite.config.js with Vite (ADR-0001); jsdom provides document/localStorage/CustomEvent for Foundation+Core tests; zero duplicate config"
    referenced_by:
      - docs/architecture/adr-0009-test-framework-and-ci.md
    added: 2026-05-21
    revised: ""

