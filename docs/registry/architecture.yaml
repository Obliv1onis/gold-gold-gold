# ─── FORBIDDEN PATTERNS ──────────────────────────────────────────────────────
# Architecture anti-patterns explicitly banned by accepted ADRs.
# When writing a new ADR, check this list — if the proposed approach matches
# a forbidden pattern, it must be reworked before the ADR can be Accepted.
#
# Register a pattern when an ADR explicitly bans it AND other ADRs might
# unknowingly use it (i.e., it's a tempting but wrong approach for this project).

forbidden_patterns:
  - pattern: native_modules_bypass_vite
    status: active
    description: "Do not load modules via bare <script type='module'> tags without going through the Vite pipeline. All JS must be imported through src/main.js or a Vite entry point."
    why: "Bypassing Vite breaks HMR, npm package resolution, path aliasing, and Vitest test coverage. Discovered modules outside the pipeline will silently fail in production builds."
    adr: docs/architecture/adr-0001-web-stack-and-module-system.md
    added: 2026-05-21

  - pattern: barrel_index_files
    status: active
    description: "Do not create index.js barrel files in any src/ subdirectory. All imports must reference the module file directly (e.g. '../core/virtual-economy.js', not '../core/')."
    why: "Barrel files mask what a module actually exports, prevent Vite from tree-shaking unused exports, and create ambiguity about the actual public API surface."
    adr: docs/architecture/adr-0002-module-file-structure.md
    added: 2026-05-21

  - pattern: upward_layer_imports
    status: active
    description: "A module may only import from the same layer or a lower layer. Forbidden: src/core/ importing from src/feature/ or src/presentation/; src/foundation/ importing from src/core/ or above."
    why: "Upward imports create circular dependencies and break the 5-layer dependency rule. The layer structure only enforces architectural constraints if imports flow strictly downward."
    adr: docs/architecture/adr-0002-module-file-structure.md
    added: 2026-05-21

  - pattern: inline_event_name_strings
    status: active
    description: "Do not use inline string literals for CustomEvent names anywhere in src/. All event names must reference the Events.* constants from src/foundation/events.js."
    why: "String typos (e.g. 'balance_changed' vs 'balance-changed') fail silently at runtime with no error. Constants are auto-completed by IDEs and cause a ReferenceError on typo."
    adr: docs/architecture/adr-0003-dom-event-architecture.md
    added: 2026-05-21

  - pattern: window_dispatch_for_app_events
    status: active
    description: "Do not use window.dispatchEvent() for application-internal events. Use document.dispatchEvent() with CustomEvent. window is reserved for browser-level events."
    why: "window.dispatchEvent mixes app-internal events with browser-level events (resize, popstate). Standardizing on document eliminates listener-on-wrong-target failures. Resolves W-5 cross-GDD advisory."
    adr: docs/architecture/adr-0003-dom-event-architecture.md
    added: 2026-05-21

  - pattern: audio_calls_outside_audio_system
    status: active
    description: "Do not create AudioContext, OscillatorNode, or GainNode instances anywhere except src/foundation/audio-system.js. All audio playback must go through AudioSystem.playTick(), AudioSystem.playReveal(), or AudioSystem.playUI()."
    why: "Multiple AudioContext instances cause resource exhaustion. Inline audio calls in Orchestrator or Presentation modules violate Architecture Principle 3 (Sound Is First Class) and make audio untestable in isolation."
    adr: docs/architecture/adr-0004-audio-implementation.md
    added: 2026-05-21

  - pattern: direct_localstorage_access
    status: active
    description: "Do not call localStorage.getItem(), localStorage.setItem(), localStorage.removeItem(), or localStorage.clear() anywhere except src/foundation/persistence.js. All persistence reads and writes must go through Persistence.save(), Persistence.load(), Persistence.delete(), or Persistence.clearAll()."
    why: "Direct calls scatter the vault_ prefix convention and duplicate try/catch graceful-degradation logic. A single module is testable in isolation; scattered calls are not. Enforces the atomic mutation contract (mutate → save → dispatch)."
    adr: docs/architecture/adr-0005-persistence-strategy.md
    added: 2026-05-21

  - pattern: raf_loop_outside_reel_animation_engine
    status: active
    description: "Do not call requestAnimationFrame() anywhere except src/feature/reel-animation-engine.js. No other module may start, stop, or own an animation loop."
    why: "Multiple concurrent RAF loops cause ordering ambiguity between frame renders. The RAE is the sole animation loop owner — all per-frame work is dispatched through the onFrame/onTick callbacks it manages. Two RAFs running simultaneously would make render order browser-dependent."
    adr: docs/architecture/adr-0006-animation-loop-and-reel-data-transport.md
    added: 2026-05-21

  - pattern: direct_image_construction_outside_loader
    status: active
    description: "Do not use 'new Image()' or create <img> elements for skin/case art anywhere except src/foundation/skin-image-loader.js. All skin image access must go through SkinImageLoader.getImage() or SkinImageLoader.preloadCase()."
    why: "Direct Image() calls bypass the shared cache, causing duplicate network requests and losing the placeholder fallback contract. Modules outside the loader cannot know if an image is already cached, in-flight, or failed — only the loader knows."
    adr: docs/architecture/adr-0007-skin-image-loading-and-placeholder-strategy.md
    added: 2026-05-21

  - pattern: direct_price_api_fetch_outside_price_layer
    status: active
    description: "Do not call fetch() against price API endpoints from anywhere except src/feature/price-api-layer.js. All price lookups must go through PriceAPILayer.getPrice(itemId). The VITE_PRICE_API_BASE environment variable must not be read outside this module."
    why: "Direct fetch calls bypass the 5-minute TTL cache and the fallback-to-CaseDataStore logic. Multiple modules fetching independently will hammer rate limits and return inconsistent price states. PriceAPILayer is the sole module that knows whether to return live, stale, or fallback prices."
    adr: docs/architecture/adr-0008-price-api-and-cors-solution.md
    added: 2026-05-21

