# ─── INTERFACE CONTRACTS ──────────────────────────────────────────────────────
# How systems are required to communicate with each other.
# Conflicts: one ADR expects signal, another expects direct call = integration bug.
#
# Register a contract when the communication pattern between two systems is
# explicitly decided in an ADR and other systems must follow the same pattern.
#
# pattern options: signal | direct_call | event_bus | shared_resource | rpc | none

interfaces:
  - contract: state_event_bus
    status: active
    pattern: event_bus
    producer: "Core/Feature layer modules (VirtualEconomy, CaseInventory, SkinInventory, PriceAPILayer, ReelUI)"
    consumers:
      - HUD/AppShell
      - InventoryUI
      - CaseBrowserUI
      - MarketBrowserUI
    adr: docs/architecture/adr-0003-dom-event-architecture.md
    target: document
    mechanism: "document.dispatchEvent(new CustomEvent(Events.NAME, { detail: { ... } }))"
    constants_file: src/foundation/events.js
    events:
      - name: balance-changed
        constant: Events.BALANCE_CHANGED
        detail: "{ balance: number }"
      - name: case-inventory-changed
        constant: Events.CASE_INVENTORY_CHANGED
        detail: "{ caseId: string, count: number }"
      - name: skin-inventory-changed
        constant: Events.SKIN_INVENTORY_CHANGED
        detail: "{ inventory: SkinEntry[] }"
      - name: price-updated
        constant: Events.PRICE_UPDATED
        detail: "{ itemId: string, price: number, source: string }"
      - name: reel-ready
        constant: Events.REEL_READY
        detail: "{}"
    referenced_by:
      - docs/architecture/adr-0003-dom-event-architecture.md
    added: 2026-05-21
    revised: ""

